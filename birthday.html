<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Happy Birthday Animation</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #ff9a9e, #fad0c4);
    overflow: hidden;
    height: 100vh;
}

.container {
    position: absolute;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    text-align: center;
}

h1 {
    font-size: 60px;
    color: white;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(0,0,0,0.5);
    animation: slideDown 2s ease-out, glow 2s infinite alternate;
}

@keyframes slideDown {
    from {
        transform: translateY(-200px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 30px #ff0; }
}

.photo-frame {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border-radius: 50%;
    border: 8px solid white;
    overflow: hidden;
    animation: zoomIn 2s ease;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes zoomIn {
    from {
        transform: scale(0);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.cake {
    font-size: 120px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

.message {
    font-size: 24px;
    color: white;
    margin-top: 15px;
    animation: fadeIn 4s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.balloon {
    position: absolute;
    bottom: -150px;
    font-size: 40px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    from {
        transform: translateY(0);
    }
    to {
        transform: translateY(-120vh);
    }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    animation: fall linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-100px) rotate(0deg);
    }
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}

.typing {
    overflow: hidden;
    border-right: 3px solid white;
    white-space: nowrap;
    margin: 0 auto;
    width: 0;
    animation: typing 4s steps(40, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Happy Birthday 🎉</h1>

<div class="photo-frame">
<img src="nisha.jpg" alt="Birthday Photo">
</div>

<div class="cake">🎂</div>

<div class="message typing">
Wishing you happiness, success, and lots of joy on your special day!
</div>

</div>

<script>

// Confetti
for (let i = 0; i < 60; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.backgroundColor =
        "hsl(" + Math.random() * 360 + ", 100%, 50%)";
    confetti.style.animationDuration =
        (Math.random() * 3 + 2) + "s";
    document.body.appendChild(confetti);
}

// Balloons
let balloons = ["🎈","🎈","🎈","🎈","🎈"];

for (let i = 0; i < balloons.length; i++) {
    let balloon = document.createElement("div");
    balloon.classList.add("balloon");
    balloon.innerHTML = balloons[i];
    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.animationDuration =
        (Math.random() * 5 + 5) + "s";
    document.body.appendChild(balloon);
}

</script>

</body>
</html>
